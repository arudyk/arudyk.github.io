<!DOCTYPE html>
<html class="staticrypt-html" lang="en">
<head>
    <meta charset="utf-8" />
    <title>Protected Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />

    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
    <meta http-equiv="pragma" content="no-cache" />

    <style>
        @font-face {
            font-family: "Inter";
            font-style: normal;
            font-display: swap;
            font-weight: 400;
            src: url("/fonts/Inter-Regular.woff2") format("woff2"),
                 url("/fonts/Inter-Regular.woff") format("woff");
        }
        @font-face {
            font-family: "Inter";
            font-style: normal;
            font-display: swap;
            font-weight: 800;
            src: url("/fonts/Inter-Bold.woff2") format("woff2"),
                 url("/fonts/Inter-Bold.woff") format("woff");
        }

        :root {
            --bg: #232425;
            --bg-secondary: #1b1c1d;
            --border: #4e4e57;
            --color: #a9a9b3;
            --color-strong: #fff;
            --accent: #008000;
        }

        .staticrypt-html, .staticrypt-body { height: 100%; }
        .staticrypt-body {
            margin: 0;
            background: var(--bg);
            color: var(--color);
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Roboto", "Segoe UI", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .staticrypt-content {
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        .staticrypt-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
        }
        .logo {
            display: inline-flex;
            align-items: center;
            font-family: monospace, monospace;
            font-weight: bold;
            color: var(--color-strong);
            text-decoration: none;
        }
        .logo__mark { margin-right: 5px; }
        .logo__text { font-size: 1.125rem; white-space: nowrap; }
        .logo__cursor {
            display: inline-block;
            width: 10px;
            height: 1rem;
            background: var(--accent);
            margin-left: 5px;
            border-radius: 1px;
            animation: cursor 1s infinite;
        }
        @keyframes cursor {
            0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; }
        }
        @media (prefers-reduced-motion: reduce) {
            .logo__cursor { animation: none; }
        }

        .staticrypt-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .staticrypt-form {
            width: 100%;
            max-width: 380px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 36px 32px;
            box-sizing: border-box;
        }

        .staticrypt-instructions {
            text-align: center;
            margin-bottom: 8px;
        }
        .staticrypt-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--color-strong);
            margin: 0 0 8px;
        }
        .staticrypt-instructions p:not(.staticrypt-title) {
            margin: 0;
            font-size: 0.95rem;
            opacity: 0.8;
        }

        .staticrypt-hr {
            border: 0;
            border-top: 1px solid var(--border);
            margin: 24px 0;
        }

        .staticrypt-password-container {
            position: relative;
            background: var(--bg);
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .staticrypt-form input[type="password"],
        .staticrypt-form input[type="text"] {
            background: transparent;
            border: 0;
            outline: 0;
            color: var(--color-strong);
            font-family: inherit;
            font-size: 14px;
            padding: 14px 44px 14px 14px;
            width: 100%;
            box-sizing: border-box;
        }

        .staticrypt-toggle-password-visibility {
            cursor: pointer;
            height: 18px;
            width: 18px;
            opacity: 0.5;
            padding: 13px;
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            filter: invert(1);
        }
        .staticrypt-toggle-password-visibility:hover { opacity: 0.85; }

        .staticrypt-decrypt-button {
            text-transform: uppercase;
            letter-spacing: 0.05em;
            outline: 0;
            background: var(--accent);
            color: var(--color-strong);
            font-family: inherit;
            font-weight: 800;
            font-size: 14px;
            width: 100%;
            border: 0;
            padding: 14px;
            cursor: pointer;
        }
        .staticrypt-decrypt-button:hover,
        .staticrypt-decrypt-button:focus,
        .staticrypt-decrypt-button:active {
            filter: brightness(115%);
        }

        .hidden { display: none !important; }

        .staticrypt-spinner-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .staticrypt-spinner {
            display: inline-block;
            width: 2rem;
            height: 2rem;
            border: 0.25em solid var(--border);
            border-right-color: transparent;
            border-radius: 50%;
            animation: spinner-border 0.75s linear infinite;
        }
        @keyframes spinner-border { 100% { transform: rotate(360deg); } }

        @media screen and (-webkit-min-device-pixel-ratio: 0) {
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] { font-size: 16px; }
        }
    </style>
</head>
